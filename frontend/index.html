<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Inventory System</title>
    <style>
        body {font-family: sans-serif; padding: 20px;}
        table {border-collapse: collapse; width: 100%; margin-top: 20px;}
        th, td {border: 1px solid #ccc; padding: 8px; text-align: left;}
        .hidden {display: none;}
        .modal {border: 1px solid #000; padding:20px; margin-top: 20px; background:#f9f9f9; width: 300px;}
        input, textarea {width: 100%; margin-bottom: 10px; box-sizing: border-box;}
        textarea {resize: vertical;}
        .readonly {background-color: #e9ecef;}
    </style>
</head>

<body>
    <h1> Inventory Data </h1>

    <!-- Create Button-->
    <button onclick="showCreateForm()">+ Add Item</button>

    <!--Main Page (List View Table)-->
    <table id = "itemTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Item Name</th>
                <th>Price (IDR)</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be injected here later by JavaScript -->
    </table>

    <!--Modal Form (For Create, View, and Edit)-->
    <div id="formModal" class="modal hidden">
        
        <h3 id="modalTitle">Item Form</h3>
        <input type="hidden" id="itemId">

        <label>Item Name : </label>
        <input type="text" id="itemName">

        <label>Description : </label>
        <textarea id="itemDesc"></textarea>

        <label>Price (IDR) : </label>
        <input type="number" id="itemPrice">

        <label>Amount : </label>
        <input type="number" id="itemAmount">

        <div id="formButtons">
            <!-- Buttons will be adjusted by JavaScript-->
        </div>
    </div>

    <script>
        const apiUrl = "http://127.0.0.1:8000";

        // Function to Load the Data into the Table
        async function loadData() {
            const response = await fetch(`${apiUrl}/items`);
            const items = await response.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // To clear existing data

            items.forEach(item => {
                tbody.innerHTML += `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.short_name}</td>
                    <td>${item.price}</td>
                    <td>${item.amount}</td>
                    <td>
                        <button onclick="showViewForm('${item.id}')">View/Edit</button>
                        <button onclick="deleteItem('${item.id}')">Delete</button>
                    </td>
                </tr>
                `;
            });
        }

        // Show Create Form
        function showCreateForm() {
            document.getElementById("formModal").classList.remove("hidden");
            document.getElementById("modalTitle").innerText = "Add New Item";
            clearForm();
            setReadOnly(false);

            document.getElementById("formButtons").innerHTML = `
                <button onclick="saveNewItem()">Save</button>
                <button onclick="hideModal()">Cancel</button>
            `;
        }

        // Show View Form (Greyed out)
        async function showViewForm(id) {
            const response = await fetch(`${apiUrl}/items`);
            const items = await response.json();

            const item = items.find (i => i.id === id);

            document.getElementById("formModal").classList.remove("hidden");
            document.getElementById("modalTitle").innerText = "View Item Details";

            // Filling the form with item data
            document.getElementById("itemId").value = item.id;
            document.getElementById("itemName").value = item.short_name;
            document.getElementById("itemDesc").value = item.description || "";
            document.getElementById("itemPrice").value = item.price;
            document.getElementById("itemAmount").value = item.amount;

            setReadOnly(true); // Set the form to read-only

            document.getElementById("formButtons").innerHTML = `
                <button onclick="enableEdit()">Edit</button>
                <button onclick="hideModal()">Close</button>
            `;
        }

        // Enable the Edit Mode
        function enableEdit() {
            document.getElementById("modalTitle").innerText = "Edit Item Details";
            setReadOnly(false); // Make the form editable

            document.getElementById("formButtons").innerHTML = `
                <button onclick="updateItem()">Save</button>
                <button onclick="hideModal()">Cancel</button>
            `;
        }

        // Save the New Item (POST)
        async function saveNewItem() {
            const data = {
                short_name: document.getElementById("itemName").value,
                description: document.getElementById("itemDesc").value,
                price: parseFloat(document.getElementById("itemPrice").value),
                amount: parseInt(document.getElementById("itemAmount").value)
            };

            await fetch(`${apiUrl}/item`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            hideModal();
            loadData(); // Refresh the table
        }

        // Save Updated Item (PUT)
        async function updateItem() {
            const id = document.getElementById("itemId").value;
            const data = {
                short_name: document.getElementById("itemName").value,
                description: document.getElementById("itemDesc").value,
                price: parseInt(document.getElementById("itemPrice").value),
                amount: parseInt(document.getElementById("itemAmount").value)
            };

            await fetch(`${apiUrl}/item/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            hideModal();
            loadData(); // Refresh the table
        }

        // Confirm and Delete Item (DELETE)
        async function deleteItem(id) {
            if (confirm("Are you sure you want to delete this item?")) {
                await fetch(`${apiUrl}/item/${id}`, {method: 'DELETE'});
                loadData(); // Refresh the table
            }
        }

        // Utils
        function hideModal() { document.getElementById("formModal").classList.add("hidden"); }
        function clearForm() {
            document.getElementById("itemId").value = '';
            document.getElementById("itemName").value = '';
            document.getElementById("itemDesc").value = '';
            document.getElementById("itemPrice").value = '';
            document.getElementById("itemAmount").value = '';
        }

        function setReadOnly(isReadOnly) {
            const inputs = document.querySelectorAll("#formModal input:not([type='hidden']), #formModal textarea");
            inputs.forEach(input => {
                input.readOnly = isReadOnly;
                if (isReadOnly) input.classList.add("readonly");
                else input.classList.remove("readonly");
            });
        }

        // Run loadData when the page is first openeed
        window.onload = loadData;

    </script>
</body>
</html>
