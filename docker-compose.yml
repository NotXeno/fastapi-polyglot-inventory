services:
  # PostgreSQL Container for Data Inventory
  db:
    image: postgres:16
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: notxeno01
      POSTGRES_PASSWORD: notxeno
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    networks:
      - inventory-network

  # MongoDB Container for API Logging
  mongodb:
    image: mongo:latest
    container_name: inventory-mongodb
    ports:
      - "27017:27017"
    networks:
      - inventory-network

  # FastAPI Backend Container
  backend:
    build: ./backend
    container_name: inventory-backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongodb
    networks:
      - inventory-network

  # Nginx Frontend Container
  frontend: 
    build: ./frontend
    container_name: inventory-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inventory-network
      
networks:
  inventory-network:
    driver: bridge